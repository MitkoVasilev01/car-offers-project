<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Регистрация</h4>
        </div>
        <div class="card-body">

          <form th:action="@{/users/register}" th:object="${userRegisterDto}" method="post">

            <div class="mb-3">
              <label class="form-label">Потребителско име</label>
              <input type="text" th:field="*{username}" class="form-control" th:errorclass="is-invalid">
              <div class="invalid-feedback" th:errors="*{username}">Грешка</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Имейл</label>
              <input type="email" th:field="*{email}" class="form-control" th:errorclass="is-invalid">
              <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Парола</label>
              <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid">
              <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Потвърди Парола</label>
              <input type="password" th:field="*{confirmPassword}" class="form-control">

              <div th:if="${passMismatch}" class="text-danger small">Паролите не съвпадат!</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Регистрирай се</button>
          </form>

          <div class="mt-3 text-center">
            <a href="/users/login">Вече имаш акаунт? Влез тук.</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
