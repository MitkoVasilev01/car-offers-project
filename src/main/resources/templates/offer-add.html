<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добави Обява</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Продай колата си</h4>
                </div>
                <div class="card-body">

                    <form th:action="@{/offers/add}" th:object="${AddOfferDto}" method="post">


                        <div class="mb-3">
                            <label class="form-label">Марка и Модел</label>
                            <select th:field="*{modelId}" class="form-select" required>
                                <option value="">Избери модел</option>
                                <optgroup th:each="brand : ${brands}" th:label="${brand.name}">
                                    <option th:each="model : ${brand.models}"
                                            th:value="${model.id}"
                                            th:text="${model.name}">X5</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            <div class="text-danger" th:errors="*{description}">Error</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Двигател</label>
                                <select th:field="*{engine}" class="form-select">
                                    <option th:each="e : ${engines}" th:value="${e}" th:text="${e}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Скорости</label>
                                <select th:field="*{transmission}" class="form-select">
                                    <option th:each="t : ${transmissions}" th:value="${t}" th:text="${t}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Цена (лв.)</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Година</label>
                                <input type="number" th:field="*{year}" class="form-control">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Пробег (км)</label>
                                <input type="number" th:field="*{mileage}" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Снимка (URL)</label>
                            <input type="text" th:field="*{imageUrl}" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-warning w-100">Публикувай обявата</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
