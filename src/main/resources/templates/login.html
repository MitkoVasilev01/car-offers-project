<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Вход</h4>
        </div>
        <div class="card-body">


          <div th:if="${param.error}" class="alert alert-danger">
            Грешно име или парола!
          </div>

          <form th:action="@{/users/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Потребителско име</label>
              <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Парола</label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Влез</button>
          </form>

          <div class="mt-3 text-center">
            <a href="/users/register">Нямаш акаунт? Регистрирай се.</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
