<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход | FindCar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
        color: #212529;
    }

    .navbar-custom {
        background-color: #1a1a1a !important;
        padding: 1rem 0;
    }

    .navbar-brand {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
    }

    .login-card-header {
        background-color: #1a1a1a;
        color: #ffc107; /* Жълто (Warning) като логото */
        text-align: center;
        font-weight: bold;
        padding: 1.5rem;
        border-bottom: 4px solid #ffc107;
    }

    .btn-theme {
        background-color: #ffc107;
        color: #212529;
        font-weight: 700;
        border: none;
    }
    .btn-theme:hover {
        background-color: #e0a800;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="fas fa-car-side text-warning"></i> FindCar
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="/">Начало</a></li>
        <li class="nav-item1"><a class="nav-link" href="/offers/search">Разширено търсене</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container" style="margin-top: 120px;">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-3 overflow-hidden">

        <div class="login-card-header">
          <h3 class="mb-0"><i class="fas fa-sign-in-alt"></i> Вход в системата</h3>
        </div>

        <div class="card-body p-4">
          <div th:if="${param.error}" class="alert alert-danger text-center shadow-sm">
            <i class="fas fa-exclamation-circle"></i> Грешно име или парола!
          </div>

          <form th:action="@{/users/login}" method="post">
            <div class="mb-3">
              <label class="form-label fw-bold">Потребителско име</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Username" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Парола</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="******" required>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-theme btn-lg py-3">ВЛЕЗ</button>
            </div>
          </form>

          <div class="mt-4 text-center">
            <p class="text-muted">Нямаш акаунт? <a href="/users/register" class="text-warning fw-bold text-decoration-none">Регистрирай се тук</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
