<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindCar | Намери своята кола</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #212529;
        }

        .navbar-custom {
            background-color: #1a1a1a !important;
            padding: 1rem 0;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .nav-item1 {
            margin-left: 15px;
            margin-right: 15px;
        }

        .hero-section {
            position: relative;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 5rem;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }


        .search-wrapper {
            position: relative;
            margin-top: -100px;
            z-index: 10;

        }

        .search-container {
            background: #ffffff;
            padding: 30px;
            margin-top: 100px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .category-card {
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .category-card:hover {
            transform: translateY(-5px);
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #fff3cd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            transition: background 0.3s;
        }
        .category-card:hover .icon-circle {
            background-color: #ffc107;
        }

        .cta-section {
            background: linear-gradient(90deg, #1a1a1a 0%, #333333 100%);
            color: white;
            padding: 80px 0;
            margin-top: 80px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-car-side text-warning"></i> FindCar
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="/">Начало</a></li>
                <li class="nav-item1"><a class="nav-link" href="/offers/search">Разширено търсене</a></li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn" href="/users/login">Вход</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle text-warning" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle"></i> <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/offers/add">➕ Добави Обява</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/users/logout}" method="post">
                                <button class="dropdown-item text-danger">Изход</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero-section">
    <div class="container hero-content">
        <h1 class="display-3">Намери мечтаната кола</h1>
        <p class="lead fs-4">Хиляди проверени обяви на едно място.</p>
    </div>
</div>

<div class="container search-wrapper">
    <div class="search-container">
        <h4 class="mb-4 fw-bold"><i class="fas fa-search text-warning"></i> Бързо търсене</h4>

        <form action="/offers" method="get">
            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label text-muted small fw-bold">МАРКА</label>
                    <select name="modelId" class="form-select form-select-lg bg-light border-0">
                        <option value="">Всички</option>
                        <optgroup th:each="brand : ${brands}" th:label="${brand.name}">
                            <option th:each="model : ${brand.models}"
                                    th:value="${model.id}"
                                    th:text="${model.name}">X5</option>
                        </optgroup>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label text-muted small fw-bold">ГОДИНА (ОТ)</label>
                    <select name="minYear" class="form-select form-select-lg bg-light border-0">
                        <option value="">Всички</option>
                        <option th:each="year : ${years}" th:value="${year}" th:text="${year}"></option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label text-muted small fw-bold">МАКС. ЦЕНА</label>
                    <input type="number" name="maxPrice" class="form-control form-control-lg bg-light border-0" placeholder="€">
                </div>

                <div class="col-md-3">
                    <label class="form-label text-muted small fw-bold">ДВИГАТЕЛ</label>
                    <select name="engine" class="form-select form-select-lg bg-light border-0">
                        <option value="">Всички</option>
                        <option th:each="e : ${engines}"
                                th:value="${e}"
                                th:text="${e.label}">
                        </option>
                    </select>
                </div>


                <div class="col-md-2 d-grid">
                    <label class="form-label d-none d-md-block">&nbsp;</label>
                    <button type="submit" class="btn btn-warning btn-lg fw-bold text-dark">
                        ТЪРСИ
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

        </div>
    </div>
</div>

<section class="cta-section text-center">
    <div class="container">
        <h2 class="fw-bold mb-3">Искаш да продадеш колата си?</h2>
        <p class="lead mb-4 text-white-50">Публикувай обява в FindCar и намери купувач бързо.</p>
        <a href="/offers/add" class="btn btn-warning btn-lg px-5 fw-bold rounded-pill shadow">
            <i class="fas fa-plus-circle"></i> ДОБАВИ ОБЯВА
        </a>
    </div>
</section>

<footer class="bg-dark text-white py-4 mt-0">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 FindCar. Всички права запазени.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
